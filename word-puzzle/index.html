<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小學生必備 2000 單字｜Nancy 老師的單字樂園</title>
  <style>
    :root{--ink:#423b54;--purple:#7257c8;--pink:#ff8fb4;--cream:#fffaf0;--yellow:#ffd96a}
    *{box-sizing:border-box}body{color:var(--ink);font-family:"Microsoft JhengHei",Arial,sans-serif;background:#f4edff;margin:0}button,select{font:inherit}button{cursor:pointer}
    .page{background:radial-gradient(circle at 15% 18%,#fff9cf 0 9%,transparent 9.5%),radial-gradient(circle at 86% 80%,#ffddec 0 11%,transparent 11.5%),linear-gradient(150deg,#e8dcff,#fff3df);place-items:center;min-height:100vh;padding:28px 18px;display:grid}
    .card{background:#ffffffeb;border:3px solid #fff;border-radius:32px;width:min(700px,100%);box-shadow:0 20px 55px #5b3d962e}
    .welcome,.result{text-align:center;padding:38px clamp(22px,7vw,64px)}.mascot{font-size:72px}.eyebrow{color:var(--purple);letter-spacing:.08em;margin:8px 0;font-weight:800}
    h1{letter-spacing:-.04em;color:#58429d;margin:4px 0 8px;font-size:clamp(40px,8vw,62px)}.subtitle{color:#6e677c;margin:0 auto 28px;font-size:18px;line-height:1.7}
    .picker-grid{text-align:left;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px;display:grid}label{color:#615977;font-size:14px;font-weight:800}
    select{width:100%;color:var(--ink);background:#fff;border:2px solid #e5dcfa;border-radius:15px;outline:none;margin-top:8px;padding:14px;display:block}select:focus{border-color:#a58de8}
    .primary,.secondary,.retry,.skip,.home{border:0;border-radius:18px;padding:15px 24px;font-weight:900}.primary{color:#fff;background:linear-gradient(135deg,#8469da,#674dbd);box-shadow:0 8px #513a9d}.primary:disabled{opacity:.45;cursor:not-allowed}.welcome>.primary{width:100%;font-size:18px}.tiny{color:#9b94a8;margin:20px 0 0;font-size:12px}
    .practice{padding:20px clamp(16px,4vw,34px) 30px}.topbar{grid-template-columns:auto 1fr auto;align-items:center;gap:16px;display:grid}.topbar strong,.topbar span{display:block}.topbar span{color:#92899f;font-size:13px}.score{background:#fff2b9;border-radius:18px;padding:10px 13px;font-weight:900}
    .home{color:#fff;background:#7257c8;box-shadow:0 6px #4f3999}.progress{background:#eee9f3;border-radius:99px;height:11px;margin:20px 0 8px;overflow:hidden}.progress i{background:linear-gradient(90deg,#ff9aba,#ffd06b);border-radius:99px;height:100%;display:block}
    .question-nav{justify-content:space-between;align-items:center;display:flex}.previous{color:#654eaa;background:#fff;border:3px solid #8b75ce;border-radius:15px;padding:8px 18px;font-weight:900}.previous:disabled{opacity:.35}.meaning{text-align:center;color:#514272;margin:18px 0 8px;font-size:clamp(34px,8vw,54px);font-weight:950}.speak{color:#3178a5;background:#e9f6ff;border:0;border-radius:99px;margin:auto;padding:9px 16px;font-weight:800;display:block}.instruction{text-align:center;color:#91899e;margin:24px 0 10px;font-size:14px}
    .answer-zone{color:#aaa2b5;background:#faf7ff;border:3px dashed #d8caef;border-radius:20px;flex-wrap:wrap;justify-content:center;align-items:center;gap:8px;min-height:78px;padding:12px;display:flex}.tiles{flex-wrap:wrap;justify-content:center;gap:9px;min-height:82px;margin:18px 0;display:flex}.letter{color:#59439c;text-transform:lowercase;background:#fff;border:2px solid #5f47ad;border-radius:13px;min-width:45px;height:48px;padding:0 12px;font-size:22px;font-weight:950;box-shadow:0 5px #d5c8f4}
    .feedback{text-align:center;border-radius:14px;margin:8px 0 16px;padding:14px;font-size:17px;font-weight:900}.good{color:#24763b;background:#dbf7df}.try{color:#7c4d00;background:#fff0d1}.actions{grid-template-columns:1fr 1fr;gap:12px;display:grid}.secondary{color:#66577d;background:#eee9f4}.retry{color:#704b00;background:#ffe082}.skip{color:#fff;background:#8068c5}.result button{width:100%;margin-top:14px}.wrong-list{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}.wrong-list span{background:#fff1db;border-radius:99px;padding:7px 11px;font-size:13px}
    @media(max-width:560px){.picker-grid{grid-template-columns:1fr}.welcome{padding:30px 20px}.topbar{grid-template-columns:1fr auto}.home{grid-column:1/-1;width:100%}.actions{grid-template-columns:1fr}}
  </style>
</head>

    const examsText = new TextDecoder().decode(Uint8Array.from(atob(EXAMS_BASE64), c => c.charCodeAt(0)));
    function parseExams(text){
      const units=[]; let unit=null;
      for(const raw of text.split(/\r?\n/)){
        const line=raw.replace(/^\uFEFF/,"").trim();
        const head=line.match(/^(?:[^\d\s]+\s*)?(\d{2})\s+(.+?)\s*\(共/);
        if(head){unit={number:Number(head[1]),title:head[2].trim(),quizzes:[]};units.push(unit);continue}
        const quiz=line.match(/^\*?\s*第\s*(\d+)\s*次測驗\s*\([^)]*\)[：:]\s*(.+)$/);
        if(!quiz||!unit)continue;
        const words=quiz[2].replace(/\s+\d+。\s*$/,"").replace(/。\s*$/,"").split("、").map(item=>{
          const end=item.lastIndexOf(")"),start=item.lastIndexOf(" (",end);
          return start>0?{english:item.slice(0,start).trim(),chinese:item.slice(start+2,end).trim()}:{english:item.trim(),chinese:""};
        }).filter(w=>w.english);
        unit.quizzes.push({number:Number(quiz[1]),words});
      }
      return units;
    }
    const units=parseExams(examsText),app=document.getElementById("app");
    let unitIndex=0,quizIndex=0,wordIndex=0,score=0,wrong=[],answer=[],tiles=[],feedback="",finished=false;
    const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

    function home(){finished=false;app.className="card welcome";app.innerHTML=`<div class="mascot">🐻</div><p class="eyebrow">Nancy 老師的單字樂園</p><h1>小學生必備<br>2000 單字</h1><p class="subtitle">看中文、聽發音，把字母排成正確的英文單字！</p><div class="picker-grid"><label>選擇單元<select id="unit">${units.map((u,i)=>`<option value="${i}">${String(u.number).padStart(2,"0")} ${esc(u.title)}</option>`).join("")}</select></label><label>選擇測驗<select id="quiz"></select></label></div><button id="start" class="primary">開始挑戰 →</button><p class="tiny">共 ${units.length} 個主題・依照 ISSAC 測驗分配</p>`;
      const unit=document.getElementById("unit"),quiz=document.getElementById("quiz");unit.value=unitIndex;
      const fill=()=>{unitIndex=Number(unit.value);quiz.innerHTML=units[unitIndex].quizzes.map((q,i)=>`<option value="${i}">第 ${q.number} 次測驗（${q.words.length} 字）</option>`).join("");quizIndex=0};fill();unit.onchange=fill;quiz.onchange=()=>quizIndex=Number(quiz.value);document.getElementById("start").onclick=start;
    }
    function start(){wordIndex=0;score=0;wrong=[];finished=false;prepare();practice()}
    function currentQuiz(){return units[unitIndex].quizzes[quizIndex]}function currentWord(){return currentQuiz().words[wordIndex]}
    function prepare(){answer=[];tiles=shuffle(currentWord().english);feedback=""}
    function practice(){const q=currentQuiz(),w=currentWord(),pct=Math.round(wordIndex/q.words.length*100);app.className="card practice";app.innerHTML=`<header class="topbar"><button id="home" class="home">🏠 回首頁</button><div><strong>${String(units[unitIndex].number).padStart(2,"0")} ${esc(units[unitIndex].title)}</strong><span>第 ${q.number} 次測驗</span></div><div class="score">⭐ ${score}</div></header><div class="progress"><i style="width:${pct}%"></i></div><div class="question-nav"><button id="prev" class="previous" ${wordIndex===0?"disabled":""}>← 上一題</button><p>第 ${wordIndex+1} 題 / 共 ${q.words.length} 題</p></div><div class="meaning">${esc(w.chinese)}</div><button id="speak" class="speak">🔊 聽發音</button><p class="instruction">依序點選字母，排出正確單字</p><div id="answer" class="answer-zone">${answer.length?answer.map(x=>letter(x,"answer")).join(""):"點選下方字母開始拼字"}</div><div id="tiles" class="tiles">${tiles.map(x=>letter(x,"tile")).join("")}</div>${feedback?`<div class="feedback ${feedback.ok?"good":"try"}">${esc(feedback.text)}</div>`:""}<div class="actions">${feedback?(feedback.ok?`<button id="next" class="primary">${wordIndex+1===q.words.length?"看成績":"下一題 →"}</button>`:`<button id="retry" class="retry">🔄 再做一次</button><button id="next" class="skip">${wordIndex+1===q.words.length?"看成績":"下一題 →"}</button>`):`<button id="reset" class="secondary">重新排列</button><button id="check" class="primary">檢查答案</button>`}</div>`;
      document.getElementById("home").onclick=home;document.getElementById("prev").onclick=()=>{wordIndex--;prepare();practice()};document.getElementById("speak").onclick=speak;
      document.querySelectorAll("[data-place]").forEach(b=>b.onclick=()=>move(Number(b.dataset.id),b.dataset.place));
      if(feedback){if(document.getElementById("retry"))document.getElementById("retry").onclick=()=>{prepare();practice()};document.getElementById("next").onclick=next}else{document.getElementById("reset").onclick=()=>{prepare();practice()};document.getElementById("check").onclick=check}
    }
    function letter(x,place){return `<button class="letter" data-id="${x.id}" data-place="${place}">${x.char===" "?"空格":esc(x.char)}</button>`}
    function move(id,place){if(feedback)return;const from=place==="tile"?tiles:answer,to=place==="tile"?answer:tiles,index=from.findIndex(x=>x.id===id);to.push(from.splice(index,1)[0]);practice()}
    function check(){const w=currentWord(),made=answer.map(x=>x.char).join("");if(answer.length!==[...w.english].length){feedback={ok:false,text:"還有字母沒放上去喔！"}}else if(made.toLowerCase()===w.english.toLowerCase()){score++;feedback={ok:true,text:"答對了！太厲害了 🌟"}}else{wrong.push(w);feedback={ok:false,text:`正確答案是：${w.english}`}}practice()}
    function next(){if(wordIndex+1>=currentQuiz().words.length){result();return}wordIndex++;prepare();practice()}
    function speak(){if(!("speechSynthesis" in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(currentWord().english);u.lang="en-US";u.rate=.75;speechSynthesis.speak(u)}
    function result(){const q=currentQuiz();app.className="card result";app.innerHTML=`<div class="mascot">🎉</div><p class="eyebrow">完成挑戰</p><h1>${score} / ${q.words.length}</h1><p class="subtitle">${score===q.words.length?"全部答對，超級單字王！":`你完成了！還有 ${wrong.length} 個單字可以再練習。`}</p>${wrong.length?`<div class="wrong-list">${wrong.map(w=>`<span>${esc(w.english)}・${esc(w.chinese)}</span>`).join("")}</div>`:""}<button id="again" class="primary">再練一次</button><button id="back" class="secondary">🏠 回首頁</button>`;document.getElementById("again").onclick=start;document.getElementById("back").onclick=home}
    home();
  </script>
