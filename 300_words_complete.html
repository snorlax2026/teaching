und:#fff8f7;cursor:pointer;text-align:left;color:var(--brown);transition:.16s}.card:nth-child(even){background:#f8f5ff;border-color:#e2daf4}.card:hover{transform:translateY(-2px);box-shadow:0 8px 18px #73584f18}.sound{display:grid;place-items:center;flex:0 0 44px;height:44px;border-radius:15px;background:white;font-size:21px}.word{display:block;color:var(--deep);font-size:21px;font-weight:900}.spell{display:block;margin-top:2px;color:#9a7b72;font-size:13px;letter-spacing:.12em}.empty{text-align:center;padding:42px;color:#9a7b72}.home{display:inline-block;margin-top:20px;color:var(--brown);font-weight:700;text-decoration:none}footer{text-align:center;margin-top:22px;color:#a1847c;font-size:13px}@media(max-width:650px){.top{padding:22px 20px}.bear{font-size:55px}.toolbar{grid-template-columns:1fr}.count{justify-self:start}.panel{padding:20px 15px}.cards{grid-template-columns:1fr}.panel-head{align-items:flex-start;flex-direction:column}}

</head>
<body><main class="app">
<header class="top"><div class="bear">🧸</div><div><h1>國小必備300單字</h1><p>選擇課本頁數，點一下單字就能聽發音！</p></div></header>
<div class="toolbar"><input class="search" id="search" type="search" placeholder="🔎 搜尋單字，例如：apple"><div class="count" id="count"></div></div>
<nav class="pages" id="pages" aria-label="課本頁數"></nav>
<section class="panel"><div class="panel-head"><h2 id="title">P1</h2><button class="listen-all" id="listenAll">🔊 全部播放</button></div><div class="cards" id="cards"></div></section>
<a class="home" href="index.html">← 回到練習網站首頁</a><footer>Words verified from the 56-video playlist provided by Nancy.</footer>
</main>
<script>

const meanings={

,55:['這些','那些','也；太','非常','帶來','跳'],56:['踢','笑','拉','推','聞','轉；轉動']};
meanings[28].unshift('T恤');
const chinese={};Object.keys(data).forEach(p=>data[p].forEach((word,i)=>chinese[word]=meanings[p][i]));
let page=1;const pages=document.querySelector('#pages'),cards=document.querySelector('#cards'),title=document.querySelector('#title'),count=document.querySelector('#count'),search=document.querySelector('#search');
const all=Object.values(data).flat();count.textContent=`共 ${all.length} 個單字`;
for(let i=1;i<=56;i++){const b=document.createElement('button');b.className='page-btn'+(i===1?' active':'');b.textContent=`P${i}`;b.onclick=()=>showPage(i);pages.appendChild(b)}
function speak(word){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=.72;speechSynthesis.speak(u)}
function draw(words,label){title.textContent=label;cards.innerHTML='';if(!words.length){cards.innerHTML='<div class="empty">找不到符合的單字 🐾</div>';return}words.forEach(w=>{const b=document.createElement('button');b.className='card';b.innerHTML=`<span class="sound">🔊</span><span><span class="word">${w}</span><span class="spell">${chinese[w]||''}</span></span>`;b.onclick=()=>speak(w);cards.appendChild(b)})}
function showPage(n){page=n;search.value='';document.querySelectorAll('.page-btn').forEach((b,i)=>b.classList.toggle('active',i===n-1));draw(data[n],`P${n}・${data[n].length} 個單字`)}
search.oninput=()=>{const raw=search.value.trim(),q=raw.toLowerCase();if(!q){showPage(page);return}draw(all.filter(w=>w.toLowerCase().includes(q)||(chinese[w]||'').includes(raw)),`搜尋「${search.value}」`)};
document.querySelector('#listenAll').onclick=async()=>{speechSynthesis.cancel();const words=search.value?all.filter(w=>w.toLowerCase().includes(search.value.toLowerCase())):data[page];for(const w of words){await new Promise(resolve=>{const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=.72;u.onend=resolve;u.onerror=resolve;speechSynthesis.speak(u)})}};
showPage(1);
