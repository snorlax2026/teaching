<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國小必背300英語單字拼字互動卡</title>
    <style>
        /* 乾淨、高對比、不使用深色背景、符合 A4 黑白列印與單倍行距需求 */
        body {
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            line-height: 1.0;
            color: #000000;
            background-color: #ffffff;
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            border: 2px dashed #000000;
            padding: 15px;
        }
        h1 {
            font-size: 20px;
            text-align: center;
            margin: 0 0 10px 0;
        }
        /* 56頁方格切換選單，極致節省垂直空間 */
        .page-selector-title {
            font-size: 14px;
            font-weight: bold;
            margin: 0 0 5px 0;
        }
        .tabs-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            margin-bottom: 15px;
            border-bottom: 2px solid #000000;
            padding-bottom: 10px;
        }
        .tab-btn {
            padding: 5px 0;
            border: 1px solid #000000;
            background-color: #ffffff;
            color: #000000;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            text-align: center;
        }
        .tab-btn.active {
            background-color: #000000;
            color: #ffffff;
        }
        .word-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        /* 直覺式單字卡，極致縮小垂直高度，單倍行距 */
        .word-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border: 1px solid #000000;
            border-radius: 8px;
            background-color: #ffffff;
            cursor: pointer;
        }
        .word-card:hover {
            background-color: #000000;
            color: #ffffff;
        }
        .english-part {
            font-size: 16px;
            font-weight: bold;
        }
        .spell-part {
            font-size: 13px;
            font-weight: normal;
            margin-left: 8px;
            letter-spacing: 1px;
            color: #555555;
        }
        .word-card:hover .spell-part {
            color: #cccccc;
        }
        .chinese-part {
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>角落小夥伴 國小必背300字互動卡 🧸</h1>
    
    <div class="page-selector-title">請選擇課本頁數 (P1 ~ P56)：</div>
    <!-- 自動生成 56 頁按鈕的區塊 -->
    <div class="tabs-grid" id="tabs-box"></div>

    <!-- 單字卡內容區塊 -->
    <div class="word-list" id="vocabulary-box"></div>
</div>

<script>
    // 建立 1 到 56 頁的完整資料庫架構（每頁精確 6 個單字）
    const data = {};
    
    // 初始化 56 頁的預設資料
    for (let i = 1; i <= 56; i++) {
        data[`p${i}`] = [
            { en: `word ${i}-1`, spell: 'W-O-R-D', ch: '（待填單字 1）' },
            { en: `word ${i}-2`, spell: 'W-O-R-D', ch: '（待填單字 2）' },
            { en: `word ${i}-3`, spell: 'W-O-R-D', ch: '（待填單字 3）' },
            { en: `word ${i}-4`, spell: 'W-O-R-D', ch: '（待填單字 4）' },
            { en: `word ${i}-5`, spell: 'W-O-R-D', ch: '（待填單字 5）' },
            { en: `word ${i}-6`, spell: 'W-O-R-D', ch: '（待填單字 6）' }
        ];
    }

    // 精確填入 P1 的 6 個單字內容（英文維持小寫）
    data.p1 = [
        { en: 'i', spell: 'I', ch: '（我）' },
        { en: 'you', spell: 'Y-O-U', ch: '（你；你們）' },
        { en: 'he', spell: 'H-E', ch: '（他）' },
        { en: 'she', spell: 'S-H-E', ch: '（她）' },
        { en: 'it', spell: 'I-T', ch: '（它；牠）' },
        { en: 'we', spell: 'W-E', ch: '（我們）' }
    ];

    // 精確填入 P25 影片中的 6 個單字內容（英文維持小寫）
    data.p25 = [
        { en: 'color', spell: 'C-O-L-O-R', ch: '（顏色）' },
        { en: 'black', spell: 'B-L-A-C-K', ch: '（黑色）' },
        { en: 'blue', spell: 'B-L-U-E', ch: '（藍色）' },
        { en: 'brown', spell: 'B-R-O-W-N', ch: '（棕色）' },
        { en: 'green', spell: 'G-R-E-E-N', ch: '（綠色）' },
        { en: 'orange', spell: 'O-R-A-N-G-E', ch: '（橙色）' }
    ];

    // 生成 56 個頁數按鈕
    function generateTabs() {
        const tabsBox = document.getElementById('tabs-box');
        for (let i = 1; i <= 56; i++) {
            const btn = document.createElement('button');
            btn.className = i === 1 ? 'tab-btn active' : 'tab-btn';
            btn.id = `btn-p${i}`;
            btn.innerText = `P${i}`;
            btn.setAttribute('onclick', `switchPage('p${i}')`);
            tabsBox.appendChild(btn);
        }
    }

    // 渲染指定頁數的單字卡
    function renderWords(pageKey) {
        const box = document.getElementById('vocabulary-box');
        box.innerHTML = '';
        
        data[pageKey].forEach(item => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.setAttribute('onclick', `speak('${item.en}')`);
            card.innerHTML = `
                <div class="english-part">${item.en} <span class="spell-part">${item.spell}</span></div>
                <div class="chinese-part">${item.ch}</div>
            `;
            box.appendChild(card);
        });
    }

    // 切換頁數
    function switchPage(pageKey) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${pageKey}`).classList.add('active');
        renderWords(pageKey);
    }

    // 發音功能（音速 0.8 倍）
    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }
    }

    // 啟動網頁
    generateTabs();
    renderWords('p1');
</script>

</body>
</html>
